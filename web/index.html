<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WifEnglish • 购买客厅沙发套装</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
        <style>
            :root {
                --bg: #ffffff;
                --bg-elevated: #ffffff;
                --text: #171717;
                --text-secondary: #525252;
                --text-tertiary: #737373;
                --border: #e5e5e5;
                --border-strong: #d4d4d4;
                --accent: #171717;
                --accent-contrast: #ffffff;
                --current-bg: rgba(0, 0, 0, 0.03);
            }
            .dark {
                --bg: #0a0a0a;
                --bg-elevated: #171717;
                --text: #fafafa;
                --text-secondary: #a3a3a3;
                --text-tertiary: #737373;
                --border: #262626;
                --border-strong: #404040;
                --accent: #fafafa;
                --accent-contrast: #171717;
                --current-bg: rgba(255, 255, 255, 0.05);
            }
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                background-color: var(--bg);
                color: var(--text);
                -webkit-font-smoothing: antialiased;
            }
            .card {
                background-color: var(--bg-elevated);
                border-color: var(--border);
            }
            .subtitle-panel {
                scrollbar-width: thin;
                scrollbar-color: var(--border) var(--bg-elevated);
            }
            .subtitle-line {
                transition: background-color 0.15s ease, border-color 0.15s ease;
                border-left: 3px solid transparent;
            }
            .subtitle-line.current {
                border-left-color: var(--accent);
                background-color: var(--current-bg);
            }
            .subtitle-line.current .en-text {
                font-weight: 600;
            }
            .subtitle-line.current .speaker-name {
                color: var(--text);
                font-weight: 500;
            }
            .subtitle-line .speaker-name {
                color: var(--text-tertiary);
            }
            .subtitle-line .en-text {
                color: var(--text);
                font-weight: 400;
            }
            .subtitle-line .zh-text {
                color: var(--text-secondary);
            }
            .vocab {
                font-weight: 600;
                color: inherit;
                text-decoration: underline;
                text-underline-offset: 3px;
                text-decoration-thickness: 1.5px;
                text-decoration-color: var(--text-tertiary);
            }
            .current-line {
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
            }
            .scene-image {
                transition: opacity 0.3s ease;
            }
            .avatar {
                width: 28px;
                height: 28px;
                border-radius: 9999px;
                border: 1px solid var(--border-strong);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                font-weight: 600;
                color: var(--text-secondary);
                flex-shrink: 0;
            }
            .avatar-current {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
            .control-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                padding: 8px 14px;
                border: 1px solid var(--border);
                border-radius: 9999px;
                font-size: 13px;
                color: var(--text-secondary);
                background: transparent;
                transition: border-color 0.15s ease, color 0.15s ease, background-color 0.15s ease;
            }
            .control-btn:hover {
                border-color: var(--border-strong);
                color: var(--text);
                background-color: rgba(0, 0, 0, 0.02);
            }
            .dark .control-btn:hover {
                background-color: rgba(255, 255, 255, 0.04);
            }
            .control-btn.primary {
                background-color: var(--accent);
                color: var(--accent-contrast);
                border-color: var(--accent);
            }
            .control-btn.primary:hover {
                opacity: 0.85;
                background-color: var(--accent);
            }
            .speed-btn {
                padding: 5px 10px;
                border-radius: 9999px;
                font-size: 12px;
                color: var(--text-tertiary);
                border: 1px solid transparent;
                background: transparent;
                transition: all 0.15s ease;
            }
            .speed-btn:hover {
                color: var(--text);
                border-color: var(--border);
            }
            .speed-btn.active {
                color: var(--text);
                border-color: var(--text);
                font-weight: 500;
            }
            .player-expanded {
                max-width: none !important;
                padding-left: 8px !important;
                padding-right: 8px !important;
            }
            .image-area {
                height: 58vh;
                max-height: 560px;
            }
            @media (max-height: 720px) {
                .image-area {
                    height: 48vh;
                    max-height: 400px;
                }
            }
            @media (max-width: 768px) {
                .image-area {
                    height: 30vh;
                    max-height: 240px;
                    min-height: 200px;
                }
            }
            @media (max-width: 900px) and (orientation: landscape) {
                #player-split {
                    flex-direction: row !important;
                }
                #player-split > div:first-child {
                    width: 58% !important;
                }
                #player-split > div:last-child {
                    width: 42% !important;
                    border-top: 0 !important;
                    border-left: 1px solid var(--border);
                }
            }
        </style>
    </head>
    <body class="light">
        <div id="app-container" class="max-w-6xl mx-auto p-4 md:p-6">
            <!-- HOME / LESSONS LIST VIEW -->
            <div id="home-view">
                <div class="flex items-center justify-between mb-8 px-1">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 border border-[var(--border-strong)] rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-couch text-[var(--text-secondary)] text-sm"></i>
                        </div>
                        <h1 class="text-lg font-semibold tracking-tight">WifEnglish</h1>
                    </div>
                    <button
                        id="theme-toggle"
                        onclick="toggleTheme()"
                        class="control-btn"
                        title="切换白天/黑夜主题"
                    >
                        <i class="fa-solid fa-sun"></i>
                    </button>
                </div>

                <div class="mb-5 px-1">
                    <h2 class="text-base font-medium">课程列表</h2>
                    <p class="text-sm text-[var(--text-tertiary)] mt-0.5">点击课程进入自动播放</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div
                        onclick="enterPlayer()"
                        class="cursor-pointer card border border-[var(--border)] rounded-xl p-5 transition hover:border-[var(--border-strong)]"
                    >
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-xs text-[var(--text-tertiary)] tracking-widest font-medium">
                                    LESSON 01
                                </div>
                                <div class="text-lg font-semibold mt-1.5">购买客厅沙发套装</div>
                                <div class="text-sm text-[var(--text-secondary)] mt-0.5">
                                    Buying a Living Room Sofa Set
                                </div>
                            </div>
                            <div class="text-right text-xs text-[var(--text-tertiary)]">
                                <div class="border border-[var(--border)] px-2 py-0.5 rounded-md">6 场景</div>
                                <div class="mt-1.5">自动连续播放</div>
                            </div>
                        </div>
                        <div class="mt-4 text-xs text-[var(--text-tertiary)] leading-relaxed">
                            跟随着张先生完成从进店到下单的全流程对话练习
                        </div>
                    </div>

                    <div
                        class="card border border-[var(--border)] rounded-xl p-5 opacity-50"
                    >
                        <div class="text-xs text-[var(--text-tertiary)]">更多课程即将上线</div>
                        <div class="text-base font-medium mt-2">敬请期待</div>
                    </div>
                </div>
            </div>

            <!-- PLAYER VIEW -->
            <div
                id="player-view"
                class="hidden flex flex-col h-[100dvh] overflow-hidden"
            >
                <!-- Minimal top: just lesson title -->
                <div
                    class="flex-shrink-0 flex items-center justify-center border-b border-[var(--border)] py-3"
                >
                    <div class="text-center">
                        <div class="text-xs text-[var(--text-tertiary)] tracking-widest font-medium">LESSON 01</div>
                        <div class="text-sm font-medium mt-0.5">购买客厅沙发套装</div>
                    </div>
                </div>

                <!-- Main content -->
                <div id="player-split" class="flex-1 flex flex-col md:flex-row overflow-hidden min-h-0">
                    <!-- LEFT: image + current line -->
                    <div class="w-full md:w-[60%] lg:w-[58%] flex flex-col flex-shrink-0 md:flex-shrink md:min-h-0">
                        <div class="relative flex items-center justify-center overflow-hidden image-area bg-black">
                            <img id="scene-image" class="max-h-full max-w-full object-contain scene-image" alt="Scene visual" />
                        </div>

                        <!-- Current line -->
                        <div class="current-line bg-[var(--bg-elevated)] px-5 py-4 flex-shrink-0">
                            <div class="flex items-start gap-3 max-w-3xl mx-auto">
                                <div id="current-avatar" class="avatar avatar-current"></div>
                                <div class="flex-1 min-w-0">
                                    <div id="current-speaker" class="text-xs font-medium text-[var(--text-tertiary)] mb-1"></div>
                                    <div id="current-en" class="text-base leading-relaxed"></div>
                                    <div id="current-zh" class="text-sm text-[var(--text-secondary)] mt-1 leading-relaxed"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT: dialogue list -->
                    <div class="flex flex-col w-full md:w-[40%] lg:w-[42%] border-t md:border-t-0 md:border-l border-[var(--border)] bg-[var(--bg-elevated)] flex-1 min-h-0">
                        <div class="px-4 py-3 border-b border-[var(--border)] flex-shrink-0">
                            <div class="text-xs font-medium text-[var(--text-tertiary)] tracking-wide">课程对话</div>
                        </div>
                        <div id="subtitle-list" class="flex-1 overflow-y-auto subtitle-panel px-4 py-3 text-sm" style="scroll-behavior:smooth;">
                            <!-- all subtitles populated here -->
                        </div>
                    </div>
                </div>

                <!-- Bottom controls: everything centered -->
                <div
                    class="flex-shrink-0 px-4 py-4 md:py-5"
                >
                    <div class="mx-auto flex items-center justify-center gap-1 sm:gap-2 md:gap-3 border border-[var(--border)] rounded-2xl px-3 py-2.5 md:px-4 md:py-3 bg-[var(--bg-elevated)] w-fit max-w-full">
                        <!-- Nav group -->
                        <div class="flex items-center gap-1 sm:gap-1.5">
                            <button onclick="showHome()" class="control-btn" title="返回课程列表">
                                <i class="fa-solid fa-arrow-left"></i>
                                <span class="hidden sm:inline">课程列表</span>
                            </button>
                            <button onclick="showHome()" class="control-btn" title="首页">
                                <i class="fa-solid fa-home"></i>
                                <span class="hidden sm:inline">首页</span>
                            </button>
                            <button onclick="toggleTheme()" class="control-btn" title="切换主题">
                                <i class="fa-solid fa-sun theme-icon"></i>
                            </button>
                        </div>

                        <div class="w-px h-5 bg-[var(--border)] mx-1 sm:mx-2"></div>

                        <!-- Main playback group -->
                        <div class="flex items-center gap-1 sm:gap-1.5">
                            <button
                                id="play-pause-btn"
                                onclick="togglePlayPause()"
                                class="control-btn primary min-w-[96px]"
                            >
                                <i id="play-pause-icon" class="fa-solid fa-play"></i>
                                <span id="play-pause-text">播放</span>
                            </button>
                            <button onclick="restartLesson()" class="control-btn" title="重新开始">
                                <i class="fa-solid fa-undo"></i>
                            </button>
                        </div>

                        <div class="w-px h-5 bg-[var(--border)] mx-1 sm:mx-2"></div>

                        <!-- Speed group -->
                        <div class="flex items-center gap-0.5 border border-[var(--border)] rounded-full px-1 py-0.5">
                            <span class="text-xs text-[var(--text-tertiary)] px-1">速度</span>
                            <button data-speed="0.6" onclick="setGlobalSpeed(0.6)" class="speed-btn">0.6x</button>
                            <button data-speed="0.75" onclick="setGlobalSpeed(0.75)" class="speed-btn active">0.75x</button>
                            <button data-speed="1" onclick="setGlobalSpeed(1)" class="speed-btn">1x</button>
                            <button data-speed="1.25" onclick="setGlobalSpeed(1.25)" class="speed-btn">1.25x</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            let lessonData = null;
            let currentSceneIdx = 0;
            let currentLineIdx = 0;
            let isPlaying = false;
            let currentAudio = null;
            let allLines = [];
            let globalSpeed = 0.75;

            function setGlobalSpeed(speed) {
                globalSpeed = speed;
                if (currentAudio) {
                    currentAudio.playbackRate = globalSpeed;
                }
                document.querySelectorAll(".speed-btn").forEach((btn) => {
                    const active = parseFloat(btn.dataset.speed) === speed;
                    btn.classList.toggle("active", active);
                });
            }

            function showHome() {
                document.getElementById("home-view").classList.remove("hidden");
                const pv = document.getElementById("player-view");
                pv.classList.add("hidden");
                pv.style.height = '';
                document.body.style.overflow = '';

                const container = document.getElementById("app-container");
                if (container) container.classList.remove("player-expanded");

                stop();
            }

            function enterPlayer() {
                const container = document.getElementById("app-container");
                if (container) container.classList.add("player-expanded");

                document.getElementById("home-view").classList.add("hidden");
                const pv = document.getElementById("player-view");
                pv.classList.remove("hidden");

                pv.style.height = '100dvh';
                document.body.style.overflow = 'hidden';

                setTimeout(() => {
                    window.scrollTo({ top: 0, behavior: 'instant' });
                }, 5);

                if (!lessonData || !allLines.length) {
                    loadLesson().then(() => {
                        renderSubtitleList();
                        showScene(0, 0);
                    });
                } else {
                    const container = document.getElementById("subtitle-list");
                    if (container && container.children.length < 5) {
                        renderSubtitleList();
                    }
                    showScene(0, 0);
                }
            }

            async function loadLesson() {
                const res = await fetch("lesson-data.json");
                lessonData = await res.json();

                allLines = [];
                lessonData.scenes.forEach((scene, sIdx) => {
                    scene.lines.forEach((line, lIdx) => {
                        allLines.push({
                            sceneIdx: sIdx,
                            lineIdx: lIdx,
                            ...line,
                            scene,
                        });
                    });
                });

                renderSubtitleList();
                showScene(0, 0);
            }

            function renderSubtitleList() {
                const container = document.getElementById("subtitle-list");
                container.innerHTML = "";

                lessonData.scenes.forEach((scene, sIdx) => {
                    const header = document.createElement("div");
                    header.className =
                        "px-2 pt-4 pb-2 text-xs font-medium text-[var(--text-tertiary)] tracking-wide";
                    header.textContent = `${scene.id}. ${scene.title_en} / ${scene.title_zh}`;
                    container.appendChild(header);

                    scene.lines.forEach((line, lIdx) => {
                        const div = document.createElement("div");
                        const isSales =
                            line.role === "sales" ||
                            line.speaker.includes("Li") ||
                            line.speaker.includes("李");
                        const speakerClass = isSales ? "sales" : "customer";
                        div.className = `subtitle-line ${speakerClass} pl-3 pr-2 py-2.5 cursor-pointer flex gap-3 items-start mb-1 rounded-r-md`;
                        div.dataset.globalIdx = allLines.findIndex(
                            (x) => x.sceneIdx === sIdx && x.lineIdx === lIdx,
                        );

                        const en = highlightVocab(line.en, line.vocab || []);
                        const zh = highlightZhVocab(line.zh, line.vocab || []);
                        const avatarLabel = isSales ? "李" : "张";

                        div.innerHTML = `
                            <div class="avatar">${avatarLabel}</div>
                            <div class="flex-1 min-w-0">
                                <div class="text-xs speaker-name mb-0.5">${line.speaker}</div>
                                <div class="en-text text-[15px] leading-snug">${en}</div>
                                <div class="zh-text text-sm leading-snug mt-0.5">${zh}</div>
                            </div>
                        `;

                        div.onclick = () => {
                            stop();
                            showScene(sIdx, lIdx);
                            playCurrentLine();
                        };

                        container.appendChild(div);
                    });
                });
            }

            function highlightVocab(text, vocabList) {
                if (!vocabList || vocabList.length === 0) return text;
                let result = text;
                vocabList.forEach((v) => {
                    const re = new RegExp(`\\b${v}\\b`, "gi");
                    result = result.replace(re, `<span class="vocab">${v}</span>`);
                });
                return result;
            }

            const zhKeyMap = {
                showroom: "展厅",
                welcome: "欢迎",
                "sofa set": "一套沙发",
                apartment: "公寓",
                "take your time": "慢慢看",
                catalogue: "目录",
                "three-seater": "三人沙发",
                fabric: "面料",
                "easy to clean": "好打理",
                "performance fabric": "功能面料",
                "stain-resistant": "防污",
                dimensions: "尺寸",
                centimeters: "厘米",
                wide: "宽",
                deep: "深",
                fit: "适合",
                "living room": "客厅",
                cushions: "靠垫",
                comfortable: "舒服",
                matching: "配套",
                "full set": "全套",
                delivery: "送货",
                installation: "安装",
            };

            function highlightZhVocab(text, vocabList) {
                if (!vocabList || vocabList.length === 0) return text;
                let result = text;
                vocabList.forEach((v) => {
                    const zhTerm = zhKeyMap[v.toLowerCase()];
                    if (zhTerm) {
                        const re = new RegExp(zhTerm, "g");
                        result = result.replace(re, `<span class="vocab">${zhTerm}</span>`);
                    }
                });
                return result;
            }

            function showScene(sceneIdx, lineIdx) {
                const scene = lessonData.scenes[sceneIdx];
                if (!scene) return;

                currentSceneIdx = sceneIdx;
                currentLineIdx = lineIdx;

                const img = document.getElementById("scene-image");
                img.src = `visuals/scene-${String(scene.id).padStart(2, "0")}.jpg`;

                const line = scene.lines[lineIdx];
                if (line) {
                    const isSales =
                        line.role === "sales" ||
                        line.speaker.includes("Li") ||
                        line.speaker.includes("李");

                    const speakerEl = document.getElementById("current-speaker");
                    const enEl = document.getElementById("current-en");
                    const zhEl = document.getElementById("current-zh");
                    const avatarEl = document.getElementById("current-avatar");

                    speakerEl.textContent = line.speaker;
                    enEl.innerHTML = highlightVocab(line.en, line.vocab || []);
                    zhEl.innerHTML = highlightZhVocab(line.zh, line.vocab || []);

                    avatarEl.textContent = isSales ? "李" : "张";
                }

                highlightSubtitleLine(sceneIdx, lineIdx);
            }

            function highlightSubtitleLine(sceneIdx, lineIdx) {
                document
                    .querySelectorAll(".subtitle-line")
                    .forEach((el) => el.classList.remove("current"));

                const globalIdx = allLines.findIndex(
                    (x) => x.sceneIdx === sceneIdx && x.lineIdx === lineIdx,
                );
                const target = document.querySelector(
                    `.subtitle-line[data-global-idx="${globalIdx}"]`,
                );

                if (target) {
                    target.classList.add("current");
                    target.scrollIntoView({
                        behavior: "smooth",
                        block: "center",
                    });
                }
            }

            function playCurrentLine() {
                stopAudio();

                const scene = lessonData.scenes[currentSceneIdx];
                const line = scene.lines[currentLineIdx];
                if (!line) return;

                const fname = `audio/lesson01/scene${String(scene.id).padStart(2, "0")}_line${currentLineIdx.toString().padStart(2, "0")}.mp3`;

                currentAudio = new Audio(fname);
                currentAudio.playbackRate = globalSpeed;
                currentAudio.onended = () => {
                    if (!isPlaying) return;
                    advanceToNext();
                };

                currentAudio.play().catch((e) => {
                    console.warn("Audio play failed", e);
                    setTimeout(() => {
                        if (isPlaying) advanceToNext();
                    }, 1200);
                });

                showScene(currentSceneIdx, currentLineIdx);
            }

            function advanceToNext() {
                let nextScene = currentSceneIdx;
                let nextLine = currentLineIdx + 1;

                const currentSceneLines = lessonData.scenes[currentSceneIdx].lines.length;

                if (nextLine >= currentSceneLines) {
                    nextScene = currentSceneIdx + 1;
                    nextLine = 0;

                    if (nextScene >= lessonData.scenes.length) {
                        finishLesson();
                        return;
                    }
                }

                showScene(nextScene, nextLine);

                setTimeout(() => {
                    if (isPlaying) playCurrentLine();
                }, 420);
            }

            function finishLesson() {
                isPlaying = false;
                updatePlayPauseButton(false);
                const text = document.getElementById("play-pause-text");
                if (text) text.textContent = "重新播放";

                const enEl = document.getElementById("current-en");
                const zhEl = document.getElementById("current-zh");
                if (enEl) enEl.innerHTML = "课程完成！Great job!";
                if (zhEl) zhEl.innerHTML = "恭喜你完成本课练习！";
            }

            function stopAudio() {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
            }

            function togglePlayPause() {
                if (isPlaying) {
                    stop();
                } else {
                    startAutoPlay();
                }
            }

            function stop() {
                isPlaying = false;
                stopAudio();
                updatePlayPauseButton(false);
            }

            function startAutoPlay() {
                isPlaying = true;
                updatePlayPauseButton(true);

                if (
                    currentSceneIdx === lessonData.scenes.length - 1 &&
                    currentLineIdx === lessonData.scenes.at(-1).lines.length - 1
                ) {
                    showScene(0, 0);
                }

                playCurrentLine();
            }

            function updatePlayPauseButton(playing) {
                const icon = document.getElementById("play-pause-icon");
                const text = document.getElementById("play-pause-text");
                if (!icon || !text) return;

                if (playing) {
                    icon.className = "fa-solid fa-pause";
                    text.textContent = "暂停";
                } else {
                    icon.className = "fa-solid fa-play";
                    const atEnd =
                        currentSceneIdx === lessonData.scenes.length - 1 &&
                        currentLineIdx === lessonData.scenes.at(-1).lines.length - 1;
                    text.textContent = atEnd ? "重新播放" : "播放";
                }
            }

            function setupControls() {
                document.addEventListener("keydown", (e) => {
                    if (e.key === " " || e.key === "k") {
                        e.preventDefault();
                        if (isPlaying) {
                            stop();
                        } else {
                            startAutoPlay();
                        }
                    }
                    if (e.key.toLowerCase() === "r") {
                        stop();
                        showScene(0, 0);
                    }
                });
            }

            async function init() {
                const home = document.getElementById("home-view");
                const player = document.getElementById("player-view");
                if (home) home.classList.remove("hidden");
                if (player) player.classList.add("hidden");

                setupControls();

                try {
                    const res = await fetch("lesson-data.json");
                    lessonData = await res.json();
                    allLines = [];
                    lessonData.scenes.forEach((scene, sIdx) => {
                        scene.lines.forEach((line, lIdx) => {
                            allLines.push({
                                sceneIdx: sIdx,
                                lineIdx: lIdx,
                                ...line,
                                scene,
                            });
                        });
                    });
                } catch (e) {}

                setTimeout(() => {
                    setGlobalSpeed(globalSpeed);
                }, 50);

                initTheme();
            }

            window.enterPlayer = enterPlayer;
            window.showHome = showHome;
            window.restartLesson = function () {
                stop();
                showScene(0, 0);
            };

            function applyTheme(theme) {
                const isDark = theme === "dark";
                const iconHtml = isDark
                    ? '<i class="fa-solid fa-moon"></i>'
                    : '<i class="fa-solid fa-sun"></i>';
                if (isDark) {
                    document.documentElement.classList.add("dark");
                    document.body.classList.add("dark");
                    document.body.classList.remove("light");
                } else {
                    document.documentElement.classList.remove("dark");
                    document.documentElement.classList.add("light");
                    document.body.classList.add("light");
                    document.body.classList.remove("dark");
                }
                document.querySelectorAll("#theme-toggle i, .theme-icon").forEach((icon) => {
                    icon.className = isDark ? "fa-solid fa-moon" : "fa-solid fa-sun";
                });
                localStorage.setItem("theme", theme);
            }

            function toggleTheme() {
                const isDark = document.body.classList.contains("dark");
                applyTheme(isDark ? "light" : "dark");
            }

            function initTheme() {
                const saved = localStorage.getItem("theme");
                if (saved) {
                    applyTheme(saved);
                } else if (
                    window.matchMedia &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches
                ) {
                    applyTheme("dark");
                } else {
                    applyTheme("light");
                }
            }

            init();
        </script>
    </body>
</html>
