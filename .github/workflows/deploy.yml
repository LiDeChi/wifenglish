name: Deploy to Cloudflare Pages

# This workflow is currently manual-only (workflow_dispatch).
# We are switching to Cloudflare native Git integration for auto deploys
# (no GitHub Actions minutes consumed).
# Once CF Git connection is set up in dashboard, this file can be deleted.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy web --project-name=wifenglish --commit-dirty=true --branch=main
          # Optional: you can also set CLOUDFLARE_ACCOUNT_ID env if needed for other commands
          # env:
          #   CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
